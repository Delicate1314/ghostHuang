# 项目配置
dataset:
  name: ml-1m
  ratings_path: data/raw/ml-1m/ml-1m/ratings.dat
  movies_path: data/raw/ml-1m/ml-1m/movies.dat
  meta_path: data/processed/movies_meta.parquet
  poster_dir: data/raw/posters
  min_seq_len: 5
  max_seq_len: 50
  cold_ratio: 0.15

deepseek:
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.1
  max_tokens: 512

clip:
  model_name: ViT-L-14
  pretrained: openai
  batch_size: 32

embedding:
  model_name: BAAI/bge-m3
  batch_size: 64

alignment:
  proj_dim: 256
  epochs: 50
  batch_size: 256
  lr: 0.001
  alpha: 0.6

sid:
  n_levels: 3
  codebook_size: 256
  top_k_genres: 40

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  max_seq_len: 512
  dropout: 0.1
  epochs: 30
  batch_size: 32
  lr: 0.001
